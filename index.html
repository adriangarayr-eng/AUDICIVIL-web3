<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AUDICIVIL - Ricardo Ramiro Santos Rodríguez</title>
<style>
  /* Diseño tipo Cineplanet: oscuro con acentos rojos y grises */
  body {
    background-color: #121212;
    color: #fff;
    font-family: 'Arial', sans-serif;
    margin: 0; padding: 0;
  }
  header {
    background-color: #b71c1c;
    padding: 1rem;
    text-align: center;
    font-size: 1.5rem;
    font-weight: bold;
  }
  main {
    padding: 1rem;
    max-width: 900px;
    margin: auto;
  }
  h2 {
    border-bottom: 2px solid #b71c1c;
    padding-bottom: 0.5rem;
  }
  form {
    background-color: #1e1e1e;
    padding: 1rem;
    border-radius: 8px;
    margin-bottom: 2rem;
  }
  label {
    display: block;
    margin: 0.5rem 0 0.2rem;
  }
  input, textarea, select, button {
    width: 100%;
    padding: 0.5rem;
    border-radius: 4px;
    border: none;
    font-size: 1rem;
    margin-bottom: 1rem;
  }
  input[type="file"] {
    padding: 0;
  }
  button {
    background-color: #b71c1c;
    color: white;
    cursor: pointer;
  }
  button:hover {
    background-color: #8f1414;
  }
  .event {
    background-color: #222;
    margin-bottom: 1rem;
    padding: 1rem;
    border-radius: 8px;
    display: flex;
    gap: 1rem;
  }
  .event img {
    width: 120px;
    height: 80px;
    object-fit: cover;
    border-radius: 4px;
  }
  .event-info {
    flex-grow: 1;
  }
  .event-title {
    font-weight: bold;
    font-size: 1.2rem;
    margin: 0;
  }
  .event-datetime {
    font-size: 0.9rem;
    color: #bbb;
  }
</style>
</head>
<body>

<header>
  AUDICIVIL - Auditorio Ricardo Ramiro Santos Rodríguez<br />
  Escuela Profesional de Ingeniería Civil - Universidad Nacional Mayor de San Marcos
</header>

<main>
  <section id="add-event-section">
    <h2>Agregar Evento</h2>
    <form id="event-form">
      <label for="title">Título:</label>
      <input type="text" id="title" name="title" required />

      <label for="image">Imagen de referencia:</label>
      <input type="file" id="image" name="image" accept="image/*" required />

      <label for="date">Fecha:</label>
      <input type="date" id="date" name="date" required />

      <label for="time">Horario:</label>
      <input type="time" id="time" name="time" required />

      <label for="info">Información extra:</label>
      <textarea id="info" name="info" rows="3"></textarea>

      <button type="submit">Agregar Evento</button>
    </form>
  </section>

  <section id="events-section">
    <h2>Eventos del Día y Futuros</h2>
    <div id="events-list"></div>
  </section>
</main>

<script>
  const eventForm = document.getElementById('event-form');
  const eventsList = document.getElementById('events-list');

  // URL de tu Web App de Google Apps Script (coloca la URL real luego)
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwhG1slQHx6JT-F8DwwiBHqh-aNJm2HHorrgJksDWrKmEGeyW9hRy4lRF6J5mjCcw/exec';

  eventForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const title = e.target.title.value.trim();
    const imageFile = e.target.image.files[0];
    const date = e.target.date.value;
    const time = e.target.time.value;
    const info = e.target.info.value.trim();

    if (!title || !imageFile || !date || !time) {
      alert('Por favor, completa todos los campos requeridos.');
      return;
    }

    // Subir imagen y guardar evento a Google Sheets vía Apps Script
    const reader = new FileReader();
    reader.onload = async () => {
      const base64Image = reader.result.split(',')[1];

      const data = {
        action: 'addEvent',
        title,
        imageBase64: base64Image,
        date,
        time,
        info,
      };

      const response = await fetch(SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify(data),
        headers: {'Content-Type': 'application/json'}
      });

      const result = await response.json();
      if (result.success) {
        alert('Evento agregado correctamente');
        e.target.reset();
        loadEvents();
      } else {
        alert('Error al agregar evento: ' + result.message);
      }
    };
    reader.readAsDataURL(imageFile);
  });

  async function loadEvents() {
    // Solicitar eventos del backend
    const response = await fetch(SCRIPT_URL + '?action=getEvents');
    const data = await response.json();
    if (data.success) {
      renderEvents(data.events);
    } else {
      eventsList.innerHTML = '<p>No se pudieron cargar los eventos.</p>';
    }
  }

  function renderEvents(events) {
    const today = new Date();
    today.setHours(0,0,0,0);
    eventsList.innerHTML = '';
    events
      .filter(ev => new Date(ev.date) >= today)
      .sort((a,b) => new Date(a.date + 'T' + a.time) - new Date(b.date + 'T' + b.time))
      .forEach(ev => {
        const eventDiv = document.createElement('div');
        eventDiv.className = 'event';
        eventDiv.innerHTML = `
          <img src="${ev.imageUrl}" alt="${ev.title}" />
          <div class="event-info">
            <p class="event-title">${ev.title}</p>
            <p class="event-datetime">${ev.date} - ${ev.time}</p>
            <p>${ev.info || ''}</p>
          </div>
        `;
        eventsList.appendChild(eventDiv);
      });

    if (eventsList.children.length === 0) {
      eventsList.innerHTML = '<p>No hay eventos para hoy o futuros.</p>';
    }
  }

  loadEvents();
</script>

</body>
</html>

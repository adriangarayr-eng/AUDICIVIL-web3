<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AUDICIVIL | Auditorio Ricardo Ramiro Santos Rodríguez</title>
  <style>
    :root {
      --bg-light: #ffffff;
      --bg-card: #fafafa;
      --bg-surface: #ffffff;
      --bg-surface-hover: #f5f5f5;
      --red-granate: #8B0000;
      --red-hover: #A52A2A;
      --gold: #b8860b;
      --gold-light: #d4a017;
      --text-primary: #1a1a1a;
      --text-secondary: #4a4a4a;
      --text-muted: #6b6b6b;
      --border: #e0e0e0;
      --border-light: #dcdcdc;
      --shadow-lg: 0 20px 50px rgba(0,0,0,0.1);
      --shadow-card: 0 8px 24px rgba(0,0,0,0.06);
      --shadow-btn: 0 4px 14px rgba(139,0,0,0.2);
      --radius-sm: 8px;
      --radius: 12px;
      --radius-lg: 16px;
      --transition: 0.25s ease;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
      background: var(--bg-light);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
    }
    .header {
      background: #fff;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(16px);
    }
    .header-inner {
      max-width: 1300px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
    }
    .logo-area { display: flex; align-items: center; gap: 14px; }
    .logo-icon {
      width: 46px; height: 46px;
      background: linear-gradient(135deg, var(--red-granate), #5a0000);
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 900; color: #fff;
      box-shadow: 0 4px 16px rgba(139,0,0,0.3);
    }
    .logo-text { display: flex; flex-direction: column; }
    .logo-title {
      font-size: 1.35rem; font-weight: 800; letter-spacing: 2px;
      color: var(--red-granate); line-height: 1; text-transform: uppercase;
    }
    .logo-subtitle { font-size: 0.7rem; color: var(--text-muted); }
    .nav-links { display: flex; gap: 6px; align-items: center; }
    .nav-link {
      padding: 9px 18px; border-radius: 24px;
      color: var(--text-secondary); font-weight: 500;
      font-size: 0.9rem; cursor: pointer; border: none;
      background: transparent;
    }
    .nav-link:hover, .nav-link.active { color: #fff; background: var(--red-granate); }
    .nav-link.btn-add {
      background: var(--red-granate); color: #fff; font-weight: 600;
      padding: 9px 20px; box-shadow: var(--shadow-btn);
      display: flex; align-items: center; gap: 6px;
    }
    .hero {
      background: linear-gradient(160deg, #fafafa 0%, #ffffff 100%);
      border-bottom: 1px solid var(--border);
      padding: 40px 24px 36px; text-align: center;
    }
    .hero-badge {
      display: inline-block;
      background: rgba(184,134,11,0.08);
      color: var(--gold);
      font-size: 0.75rem;
      font-weight: 600; letter-spacing: 2px;
      padding: 6px 16px; border-radius: 20px;
      margin-bottom: 14px; text-transform: uppercase;
      border: 1px solid var(--gold-light);
    }
    .hero h1 { font-size: 2.6rem; font-weight: 800; color: #222; }
    .hero h2 { font-size: 1rem; color: var(--text-secondary); }
    .hero .university { font-size: 0.85rem; color: var(--text-muted); font-style: italic; }
    .hero-accent { color: var(--red-granate); }
    .main-container { max-width: 1300px; margin: 0 auto; padding: 32px 24px 60px; }
    .section-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; margin-bottom: 28px; }
    .section-title { font-size: 1.5rem; font-weight: 700; color: #222; display: flex; align-items: center; gap: 10px; }
    .section-title::before { content: ''; width: 4px; height: 28px; background: var(--red-granate); border-radius: 2px; }
    .filter-pills { display: flex; gap: 8px; }
    .filter-pill {
      padding: 8px 18px; border-radius: 24px;
      border: 1px solid var(--border-light);
      background: var(--bg-surface);
      color: var(--text-secondary); cursor: pointer;
      font-weight: 500; font-size: 0.85rem;
    }
    .filter-pill.active { background: var(--red-granate); border-color: var(--red-granate); color: #fff; }
    .event-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 22px; }
    .event-card {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      overflow: hidden;
      border: 1px solid var(--border);
      transition: var(--transition);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow-card);
    }
    .event-card:hover { transform: translateY(-6px); border-color: var(--red-granate); }
    .event-card-image { width: 100%; height: 200px; object-fit: cover; background: #eee; }
    .event-card-image-placeholder {
      width: 100%; height: 200px;
      background: linear-gradient(135deg, #f0f0f0 0%, #e6e6e6 100%);
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted); font-size: 3rem;
    }
    .event-card-body { padding: 16px 18px 20px; flex: 1; display: flex; flex-direction: column; gap: 8px; }
    .event-date-badge {
      font-size: 0.78rem;
      color: var(--gold);
      background: rgba(184,134,11,0.08);
      padding: 4px 10px; border-radius: 12px;
      width: fit-content;
    }
    .event-card-title { font-size: 1.15rem; font-weight: 700; color: #222; }
    .event-card-time { font-size: 0.85rem; color: var(--text-secondary); }
    .event-card-extra { font-size: 0.8rem; color: var(--text-muted); }
    .event-card-actions { display: flex; gap: 8px; margin-top: auto; padding-top: 8px; }
    .btn-sm { padding: 7px 14px; border-radius: 20px; font-size: 0.78rem; font-weight: 600; border: none; cursor: pointer; }
    .btn-delete { background: transparent; color: #e05555; border: 1px solid rgba(224,85,85,0.3); }
    .btn-delete:hover { background: rgba(224,85,85,0.1); }
    .btn-detail { background: transparent; color: var(--text-secondary); border: 1px solid var(--border-light); }
    .btn-detail:hover { background: #f0f0f0; color: #222; }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
    .modal { background: #fff; border-radius: var(--radius-lg); padding: 28px 30px; width: 90%; max-width: 580px; max-height: 85vh; overflow-y: auto; border: 1px solid var(--border); box-shadow: var(--shadow-lg); }
    .modal-close { position: absolute; top: 14px; right: 18px; background: #f5f5f5; border: none; color: #333; width: 34px; height: 34px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; }
    .modal-close:hover { background: #e0e0e0; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-weight: 600; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 5px; }
    .form-group input, .form-group textarea {
      width: 100%; padding: 11px 14px;
      background: #fff;
      border: 1px solid var(--border-light);
      border-radius: var(--radius-sm);
      color: #222;
      font-size: 0.95rem;
    }
    .form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--red-granate); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .btn-submit {
      width: 100%; padding: 13px;
      background: var(--red-granate);
      border: none; border-radius: var(--radius-sm);
      color: #fff; font-weight: 700; cursor: pointer;
      transition: 0.2s;
    }
    .btn-submit:hover { background: var(--red-hover); }
    .toast {
      position: fixed; bottom: 30px; right: 30px;
      background: #fff; color: #222; padding: 14px 22px;
      border-radius: var(--radius-sm); font-weight: 600;
      z-index: 300; box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      border-left: 4px solid #22c55e;
    }
    .toast.error { border-left-color: #ef4444; }
    @media (max-width: 768px) {
      .header-inner { flex-wrap: wrap; height: auto; padding: 10px 16px; gap: 10px; justify-content: center; }
      .hero h1 { font-size: 1.6rem; }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <div class="logo-area">
        <div class="logo-icon">A</div>
        <div class="logo-text">
          <span class="logo-title">AUDICIVIL</span>
          <span class="logo-subtitle">Gestión de Auditorio</span>
        </div>
      </div>
      <nav class="nav-links">
        <button class="nav-link active" onclick="filtrar('todos')">Cartelera</button>
        <button class="nav-link" onclick="filtrar('hoy')">Hoy</button>
        <button class="nav-link" onclick="filtrar('futuros')">Próximos</button>
        <button class="nav-link btn-add" onclick="abrirModalAgregar()">+ Nuevo Evento</button>
      </nav>
    </div>
  </header>
  <section class="hero">
    <div class="hero-badge">🎭 Auditorio Universitario</div>
    <h1>Ricardo Ramiro <span class="hero-accent">Santos Rodríguez</span></h1>
    <h2>Escuela Profesional de Ingeniería Civil</h2>
    <p class="university">Universidad Nacional Mayor de San Marcos</p>
  </section>
  <main class="main-container">
    <div class="section-header">
      <h3 class="section-title" id="sectionTitle">Cartelera de Eventos</h3>
      <div class="filter-pills">
        <button class="filter-pill active" onclick="filtrar('todos')">Todos</button>
        <button class="filter-pill" onclick="filtrar('hoy')">📅 Hoy</button>
        <button class="filter-pill" onclick="filtrar('futuros')">✨ Próximos</button>
      </div>
    </div>
    <div class="event-grid" id="eventGrid"></div>
  </main>
  <footer style="text-align:center;padding:20px;color:var(--text-muted);border-top:1px solid var(--border);">
    <strong>AUDICIVIL</strong> © 2026 – Auditorio Ricardo Ramiro Santos Rodríguez
  </footer>

  <div class="modal-overlay" id="modalAgregar" style="display:none;">
    <div class="modal">
      <button class="modal-close" onclick="cerrarModalAgregar()">&times;</button>
      <h3 style="color:var(--red-granate);">🎬 Agregar Nuevo Evento</h3>
      <form id="formEvento">
        <div class="form-group"><label>Título *</label><input type="text" id="titulo" required></div>
        <div class="form-group"><label>Imagen (desde tu PC)</label><input type="file" id="imagenArchivo" accept="image/*"></div>
        <div class="form-row">
          <div class="form-group"><label>Fecha *</label><input type="date" id="fecha" required></div>
          <div class="form-group"><label>Horario *</label><input type="text" id="horario" required></div>
        </div>
        <div class="form-group"><label>Info extra</label><textarea id="extra" rows="3"></textarea></div>
        <button type="submit" class="btn-submit">💾 Guardar Evento</button>
      </form>
    </div>
  </div>

  <div class="modal-overlay" id="modalDetalle" style="display:none;">
    <div class="modal">
      <button class="modal-close" onclick="document.getElementById('modalDetalle').style.display='none'">&times;</button>
      <div id="detailContent"></div>
    </div>
  </div>
  <div id="toastContainer"></div>

  <script>
    // ═══════════════ CONFIGURACIÓN ═══════════════
    const IMGBB_API_KEY = '36dfe0461ab6fa19530066bfd3d87379';      // ← Cambiar
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwB7QJiW1XTQy_eh10PRStdEPjba64FeXXss7G-XX0eEcz4PHWU9E6qRPsO9g12MmRT/exec'; // ← Cambiar
    // ════════════════════════════════════════════

    let eventos = [];
    let filtroActual = 'todos';

    async function cargarEventos() {
      try {
        const res = await fetch(`${APPS_SCRIPT_URL}?action=read`);
        const data = await res.json();
        eventos = Array.isArray(data) ? data : [];
        renderizar();
      } catch (err) {
        console.error(err);
        mostrarToast('Error al cargar eventos', 'error');
      }
    }

    function filtrar(f) {
      filtroActual = f;
      document.querySelectorAll('.filter-pill,.nav-link').forEach(el => el.classList.remove('active'));
      const titulos = { hoy: 'Eventos de Hoy', futuros: 'Próximos Eventos', todos: 'Cartelera de Eventos' };
      document.getElementById('sectionTitle').textContent = titulos[f] || titulos.todos;
      renderizar();
    }

    function renderizar() {
      const grid = document.getElementById('eventGrid');
      const hoy = new Date().toISOString().split('T')[0];
      let filtrados = eventos;
      if (filtroActual === 'hoy') filtrados = eventos.filter(e => e.fecha === hoy);
      else if (filtroActual === 'futuros') filtrados = eventos.filter(e => e.fecha >= hoy);
      filtrados.sort((a,b) => a.fecha.localeCompare(b.fecha));

      if (!filtrados.length) {
        grid.innerHTML = '<div class="empty-state"><p>No hay eventos que mostrar</p></div>';
        return;
      }

      let html = '';
      filtrados.forEach(e => {
        const f = new Date(e.fecha + 'T00:00:00');
        const fechaStr = f.toLocaleDateString('es-PE', {day:'numeric', month:'short', year:'numeric'});
        const badge = e.fecha === hoy ? '🔴 HOY - ' + fechaStr : (e.fecha > hoy ? '✨ ' + fechaStr : '📅 ' + fechaStr);
        html += `<div class="event-card" onclick="verDetalle('${e.id}')">
          ${e.imagen ? `<img src="${e.imagen}" class="event-card-image">` : '<div class="event-card-image-placeholder">🎬</div>'}
          <div class="event-card-body">
            <span class="event-date-badge">${badge}</span>
            <h4 class="event-card-title">${e.titulo}</h4>
            <span class="event-card-time">🕐 ${e.horario}</span>
            ${e.extra ? `<p class="event-card-extra">${e.extra}</p>` : ''}
            <div class="event-card-actions" onclick="event.stopPropagation()">
              <button class="btn-sm btn-detail" onclick="verDetalle('${e.id}')">Detalle</button>
              <button class="btn-sm btn-delete" onclick="eliminar('${e.id}')">Eliminar</button>
            </div>
          </div>
        </div>`;
      });
      grid.innerHTML = html;
    }

    function abrirModalAgregar() {
      document.getElementById('modalAgregar').style.display = 'flex';
      document.getElementById('formEvento').reset();
    }
    function cerrarModalAgregar() { document.getElementById('modalAgregar').style.display = 'none'; }

    async function subirImagen(archivo) {
      const fd = new FormData();
      fd.append('image', archivo);
      const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {method:'POST', body:fd});
      const json = await res.json();
      if (!json.success) throw new Error(json.error?.message || 'Error al subir imagen');
      return json.data.url;
    }

    document.getElementById('formEvento').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = this.querySelector('.btn-submit');
      const titulo = document.getElementById('titulo').value.trim();
      const fecha = document.getElementById('fecha').value;
      const horario = document.getElementById('horario').value.trim();
      const extra = document.getElementById('extra').value.trim();
      const archivo = document.getElementById('imagenArchivo').files[0];

      if (!titulo || !fecha || !horario) {
        mostrarToast('Completa título, fecha y horario', 'error');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Subiendo imagen...';
      let imagenUrl = '';
      try {
        if (archivo) imagenUrl = await subirImagen(archivo);
        btn.textContent = 'Guardando...';

        const formData = new URLSearchParams();
        formData.append('action', 'create');
        formData.append('titulo', titulo);
        formData.append('imagen', imagenUrl);
        formData.append('fecha', fecha);
        formData.append('horario', horario);
        formData.append('extra', extra);

        const res = await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: formData.toString()
        });
        if (!res.ok) throw new Error('Error del servidor');
        
        cerrarModalAgregar();
        mostrarToast('✅ Evento agregado correctamente');
        filtroActual = 'todos';
        document.querySelectorAll('.filter-pill,.nav-link').forEach(el => el.classList.remove('active'));
        document.getElementById('sectionTitle').textContent = 'Cartelera de Eventos';
        await cargarEventos();
      } catch(err) {
        mostrarToast('❌ ' + err.message, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = '💾 Guardar Evento';
      }
    });

    function verDetalle(id) {
      const ev = eventos.find(e => e.id === id);
      if (!ev) return;
      const f = new Date(ev.fecha + 'T00:00:00');
      const fechaStr = f.toLocaleDateString('es-PE', {day:'numeric', month:'long', year:'numeric', weekday:'long'});
      let html = '';
      if (ev.imagen) html += `<img src="${ev.imagen}" style="width:100%;max-height:300px;object-fit:cover;border-radius:12px;margin-bottom:18px;">`;
      html += `<h3 style="color:var(--red-granate)">${ev.titulo}</h3>
        <div style="display:flex;gap:12px;margin:14px 0;">
          <span class="event-date-badge">📅 ${fechaStr}</span>
          <span class="event-date-badge">🕐 ${ev.horario}</span>
        </div>
        ${ev.extra ? `<p>${ev.extra}</p>` : ''}`;
      document.getElementById('detailContent').innerHTML = html;
      document.getElementById('modalDetalle').style.display = 'flex';
    }

    async function eliminar(id) {
      if (!confirm('¿Eliminar este evento?')) return;
      try {
        const formData = new URLSearchParams();
        formData.append('action', 'delete');
        formData.append('id', id);
        await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: formData.toString()
        });
        mostrarToast('🗑️ Evento eliminado');
        await cargarEventos();
      } catch(err) {
        mostrarToast('Error al eliminar', 'error');
      }
    }

    function mostrarToast(msg, tipo) {
      const t = document.createElement('div');
      t.className = 'toast' + (tipo === 'error' ? ' error' : '');
      t.textContent = msg;
      document.getElementById('toastContainer').appendChild(t);
      setTimeout(() => t.remove(), 3000);
    }

    window.onclick = function(e) {
      if (e.target.classList.contains('modal-overlay')) e.target.style.display = 'none';
    }

    cargarEventos();
  </script>
</body>
</html>
